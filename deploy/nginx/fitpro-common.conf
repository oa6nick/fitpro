# Общая часть vhost'ов FitPro. Установка: /etc/nginx/snippets/fitpro-common.conf

# Загрузки клиентов (multer лимит 15 МБ + запас)
client_max_body_size 20m;

gzip on;
gzip_types text/plain text/css application/json application/javascript image/svg+xml;
gzip_min_length 1024;

# Хэшированные vite-ассеты — иммутабельный кэш, отдаём с диска
location /assets/ {
    alias /opt/fitpro/current/client/dist/assets/;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
}

# Файлы пользователей — с диска из shared (переживают релизы)
location /uploads/ {
    alias /opt/fitpro/shared/uploads/;
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
}

# Всё остальное (API + SPA) — в Node
location / {
    proxy_pass http://fitpro_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
}
