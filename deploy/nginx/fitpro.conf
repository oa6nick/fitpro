# FitPro за nginx (VPS 204.168.243.54). По образцу skill-spot.ru.conf.
# Установка: /etc/nginx/sites-available/fitpro + симлинк в sites-enabled.
# ВАЖНО: убрать блок default_server из /etc/nginx/sites-enabled/oasixlab
# (исторически прокси FitPro жил там).

upstream fitpro_app {
    server 127.0.0.1:3000;
    keepalive 16;
}

# --- Доступ по голому IP (default_server). После включения TLS на поддомене
# --- заменить тело блока на: return 301 https://fitpro.oasixlab.com$request_uri;
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    access_log /var/log/nginx/fitpro.access.log;
    error_log /var/log/nginx/fitpro.error.log;

    include snippets/fitpro-common.conf;
}

# --- Поддомен fitpro.oasixlab.com (HTTP; certbot --nginx добавит 443/redirect)
server {
    listen 80;
    listen [::]:80;
    server_name fitpro.oasixlab.com;

    access_log /var/log/nginx/fitpro.access.log;
    error_log /var/log/nginx/fitpro.error.log;

    include snippets/fitpro-common.conf;
}
