# FitPro за nginx (VPS 204.168.243.54). По образцу skill-spot.ru.conf.
# Установка: /etc/nginx/sites-available/fitpro + симлинк в sites-enabled.
#
# ПРИМЕЧАНИЕ: доступ по голому IP обслуживает исторический блок default_server
# в /etc/nginx/sites-enabled/oasixlab (proxy → 127.0.0.1:3000) — он принадлежит
# FitPro логически, но файл общий с другими сайтами, поэтому правится вручную.
# После включения TLS на поддомене этот блок стоит заменить на:
#   return 301 https://fitpro.oasixlab.com$request_uri;

upstream fitpro_app {
    server 127.0.0.1:3000;
    keepalive 16;
}

# --- Поддомен fitpro.oasixlab.com (HTTP; certbot --nginx добавит 443/redirect)
server {
    listen 80;
    listen [::]:80;
    server_name fitpro.oasixlab.com;

    access_log /var/log/nginx/fitpro.access.log;
    error_log /var/log/nginx/fitpro.error.log;

    include snippets/fitpro-common.conf;
}
