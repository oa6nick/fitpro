# Сборка iOS на облачном Mac БЕЗ GitHub Actions (аккаунт залочен биллингом).
# Codemagic бесплатный тариф: 500 macOS M-минут/мес — хватает с запасом.
# Подключение: codemagic.io → войти через GitHub → добавить oa6nick/fitpro →
# в переменных workflow задать APPETIZE_TOKEN (значение из СЕКРЕТЫ) → Start build.
workflows:
  ios-simulator:
    name: FitPro iOS Simulator → Appetize
    instance_type: mac_mini_m2
    max_build_duration: 30
    # APPETIZE_TOKEN (Secret) и опц. APPETIZE_IOS_KEY задаются в UI Codemagic
    # (Environment variables), а НЕ здесь — Codemagic запрещает пустые vars в yaml.
    environment:
      xcode: latest
    scripts:
      - name: Generate Xcode project (XcodeGen)
        script: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
          cd mobile/ios && xcodegen
      - name: Build for iOS Simulator
        script: |
          set -o pipefail
          cd mobile/ios
          xcodebuild -project FitPro.xcodeproj -scheme FitPro \
            -sdk iphonesimulator -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build CODE_SIGNING_ALLOWED=NO build
      - name: Zip .app and upload to Appetize
        script: |
          cd mobile/ios
          APP=$(find build -name "FitPro.app" -type d | head -1)
          test -n "$APP"
          ditto -c -k --keepParent "$APP" FitPro.app.zip
          if [ -n "$APPETIZE_TOKEN" ]; then
            # По умолчанию обновляем существующее iOS-приложение (ссылка стабильна).
            KEY="${APPETIZE_IOS_KEY:-db6xlagy6c77kxbq4xgsz5dgyu}"
            URL="https://api.appetize.io/v1/apps/$KEY"
            curl -sf -H "X-API-KEY: $APPETIZE_TOKEN" \
              -F "file=@FitPro.app.zip" -F "platform=ios" \
              -F "note=FitPro iOS Codemagic" "$URL"
          fi
    artifacts:
      - mobile/ios/FitPro.app.zip

  # Релизная сборка в TestFlight. Требует в Codemagic UI интеграцию App Store
  # Connect API с именем РОВНО `appstore_key` (Settings → Team integrations →
  # Developer Portal) и сохранённый distribution-сертификат в Team → Code
  # signing identities (у нас «coachly-dist»).
  #
  # Подпись — АВТОМАТИЧЕСКАЯ (блок ios_signing): Codemagic сам берёт сохранённый
  # distribution-сертификат команды и через интеграцию создаёт/тянет provisioning
  # profile под bundle id, ставит их в keychain, а `use-profiles` прописывает в
  # проект. Сертификат ПЕРЕИСПОЛЬЗУЕТСЯ каждый билд → новые НЕ плодятся, лимит
  # Apple не грозит, ручной отзыв не нужен. (Раньше был `fetch-signing-files
  # --create` без стабильного ключа: выпускал новый сертификат каждый раз и
  # упирался в 409 «You already have a current Distribution certificate».)
  ios-release:
    name: Coachly iOS TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: appstore_key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.oasixlab.fitpro
      vars:
        BUNDLE_ID: "com.oasixlab.fitpro"
      xcode: latest
    scripts:
      - name: Generate Xcode project (XcodeGen)
        script: |
          brew list xcodegen >/dev/null 2>&1 || brew install xcodegen
          cd mobile/ios
          # Номер сборки должен быть уникальным: App Store Connect отклоняет
          # повторную загрузку с тем же CURRENT_PROJECT_VERSION.
          sed -i '' "s/CURRENT_PROJECT_VERSION: \"1\"/CURRENT_PROJECT_VERSION: \"$BUILD_NUMBER\"/" project.yml
          xcodegen
      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "mobile/ios/FitPro.xcodeproj" \
            --scheme "FitPro"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true

  # Android debug APK → Appetize (демо-стенд в браузере, как iOS-Simulator workflow).
  # APPETIZE_TOKEN (Secret) берётся из тех же Environment variables Codemagic.
  # После первой сборки Appetize вернёт publicKey — впишите его в APPETIZE_ANDROID_KEY,
  # чтобы ссылка на приложение оставалась стабильной между сборками.
  android-appetize:
    # macOS-инстанс: на бесплатном тарифе Codemagic доступны только Mac M-минуты
    # (linux_x2 плану недоступен). Android нормально собирается и на macOS.
    name: Coachly Android → Appetize
    instance_type: mac_mini_m2
    max_build_duration: 40
    environment:
      java: 17
    scripts:
      - name: Build debug APK
        script: |
          set -o pipefail
          cd mobile/android
          chmod +x gradlew
          ./gradlew :app:assembleDebug
      - name: Upload to Appetize
        script: |
          APK=$(find mobile/android/app/build/outputs/apk/debug -name "*.apk" | head -1)
          test -n "$APK"
          if [ -n "$APPETIZE_TOKEN" ]; then
            KEY="${APPETIZE_ANDROID_KEY:-}"
            if [ -n "$KEY" ]; then
              URL="https://api.appetize.io/v1/apps/$KEY"
            else
              URL="https://api.appetize.io/v1/apps"
            fi
            curl -sf -H "X-API-KEY: $APPETIZE_TOKEN" \
              -F "file=@$APK" -F "platform=android" \
              -F "note=Coachly Android Codemagic" "$URL"
          else
            echo "⚠️  APPETIZE_TOKEN не задан в Codemagic — загрузку в Appetize пропускаю."
          fi
    artifacts:
      - mobile/android/app/build/outputs/apk/**/*.apk
