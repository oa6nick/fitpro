<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coachly — платформа онлайн-тренера</title>
    <meta
      name="description"
      content="Coachly — операционная система для онлайн-тренера: CRM клиентов, конструктор тренировок, дневник, отчёты, аналитика и финансы в одном кабинете. 14 дней бесплатно."
    />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f5f1ea" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#151515" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
      // Анти-FOUC: тема выставляется до загрузки бандла.
      // При включении CSP в будущем этому скрипту потребуется hash.
      (function () {
        try {
          var t = localStorage.getItem("fitpro-theme");
          if (t === "dark" || (t !== "light" && matchMedia("(prefers-color-scheme: dark)").matches))
            document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:site_name" content="Coachly" />
    <meta property="og:title" content="Coachly — платформа онлайн-тренера" />
    <meta
      property="og:description"
      content="CRM, тренировки, дневник, отчёты и аналитика — всё ведение клиентов в одном месте. 14 дней бесплатно."
    />
    <meta property="og:image" content="/og.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Coachly — платформа онлайн-тренера" />
    <meta
      name="twitter:description"
      content="CRM, тренировки, дневник, отчёты и аналитика — всё ведение клиентов в одном месте."
    />
    <meta name="twitter:image" content="/og.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
