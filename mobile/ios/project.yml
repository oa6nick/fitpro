# XcodeGen-манифест: .xcodeproj не хранится в git, генерируется на Mac командой `xcodegen`.
name: FitPro
options:
  bundleIdPrefix: com.oasixlab
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
targets:
  FitPro:
    type: application
    platform: iOS
    # Разделяемая схема нужна xcodebuild в CI (Xcode сам генерирует только локально).
    scheme: {}
    sources:
      - FitPro
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.oasixlab.fitpro
        # Только iPhone. Иначе Apple требует все четыре ориентации ради
        # iPad-мультитаскинга (ошибка 90474), а интерфейс у нас портретный.
        TARGETED_DEVICE_FAMILY: "1"
        # Иконка приложения из Assets.xcassets: без неё загрузка отклоняется
        # с «Missing Info.plist value CFBundleIconName» (ошибка 90713).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Coachly
        # Приложение ходит только по HTTPS — стандартное исключение экспортного
        # контроля. Без этого ключа каждая загрузка висит в TestFlight со
        # статусом «Missing Compliance» и не раздаётся тестировщикам.
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        # Geist подключается после добавления TTF в FitPro/Resources/Fonts (см. README).
        # INFOPLIST_KEY_UIAppFonts: ...
